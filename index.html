<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Fluke</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a237e;
    color: #fff;
    font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* --- Title bar --- */
  .title-bar {
    text-align: center;
    padding: 1.2rem 1rem 0.8rem;
    flex-shrink: 0;
  }
  .title-bar h1 {
    font-size: 3rem;
    letter-spacing: 0.15em;
    color: #ffd600;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
  }
  .title-bar .question {
    font-size: 1.5rem;
    margin-top: 0.5rem;
    color: #e0e0ff;
    font-weight: normal;
    min-height: 2em;
  }

  /* --- Board --- */
  .board {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    padding: 0.8rem 4rem;
    justify-content: center;
  }

  /* --- Answer row --- */
  .answer-row {
    perspective: 800px;
    height: calc((100% - 3rem) / 6);
    max-height: 5.5rem;
  }
  .answer-card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
  }
  .answer-row.revealed .answer-card {
    transform: rotateX(180deg);
  }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    border-radius: 0.5rem;
    font-size: 1.6rem;
    padding: 0 1.5rem;
  }
  .card-front {
    background: #283593;
    border: 3px solid #3949ab;
    justify-content: center;
  }
  .card-front .rank {
    font-size: 2rem;
    color: #7986cb;
  }
  .card-back {
    background: #ffd600;
    color: #1a237e;
    transform: rotateX(180deg);
    border: 3px solid #ffab00;
    justify-content: space-between;
  }
  .card-back .rank {
    font-size: 1.4rem;
    min-width: 2.5rem;
    text-align: centre;
  }
  .card-back .answer-text {
    flex: 1;
    text-align: left;
    padding-left: 1rem;
    text-transform: uppercase;
  }
  .card-back .answer-points {
    font-size: 1.8rem;
    min-width: 3rem;
    text-align: right;
  }

  /* --- Strikes overlay --- */
  .strikes-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    pointer-events: none;
    z-index: 100;
  }
  .strike-x {
    font-size: 12rem;
    color: #d50000;
    text-shadow: 0 0 30px rgba(213,0,0,0.7);
    opacity: 0;
    transform: scale(0);
    transition: none;
  }
  .strike-x.visible {
    opacity: 1;
    animation: strike-in 0.4s ease-out forwards;
  }
  @keyframes strike-in {
    0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
    50%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
    70%  { transform: scale(0.95) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .three-strikes-msg {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    color: #d50000;
    text-shadow: 0 0 20px rgba(213,0,0,0.6);
    background: rgba(0,0,0,0.5);
    z-index: 110;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .three-strikes-msg.visible {
    opacity: 1;
  }

  /* --- Footer / scores --- */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.8rem 2rem;
    flex-shrink: 0;
    background: rgba(0,0,0,0.25);
  }
  .team {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 12rem;
    padding: 0.5rem 1.5rem;
    border-radius: 0.5rem;
    border: 3px solid transparent;
    transition: border-color 0.3s, background 0.3s;
  }
  .team.active {
    border-color: #ffd600;
    background: rgba(255,214,0,0.12);
  }
  .team-name {
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #b0bec5;
  }
  .team.active .team-name {
    color: #ffd600;
  }
  .team-score {
    font-size: 2.8rem;
    color: #fff;
    transition: transform 0.2s;
  }
  .team-score.pulse {
    animation: score-pulse 0.4s ease;
  }
  @keyframes score-pulse {
    0%   { transform: scale(1); text-shadow: none; }
    50%  { transform: scale(1.25); text-shadow: 0 0 20px #ffd600; }
    100% { transform: scale(1); text-shadow: none; }
  }
  .round-info {
    font-size: 1rem;
    color: #7986cb;
    text-align: center;
  }
  .round-info .round-points {
    font-size: 1.6rem;
    color: #ffd600;
    display: block;
    margin-top: 0.2rem;
  }
</style>
</head>
<body>

<div class="title-bar">
  <h1>FAMILY FLUKE</h1>
  <div class="question" id="question-text"></div>
</div>

<div class="board" id="board"></div>

<div class="strikes-overlay" id="strikes">
  <span class="strike-x" id="strike-1">&#x2718;</span>
  <span class="strike-x" id="strike-2">&#x2718;</span>
  <span class="strike-x" id="strike-3">&#x2718;</span>
</div>

<div class="three-strikes-msg" id="three-strikes-msg">3 STRIKES!</div>

<div class="footer">
  <div class="team active" id="team-1">
    <span class="team-name">Team 1</span>
    <span class="team-score" id="score-1">0</span>
  </div>
  <div class="round-info">
    <span id="round-label">Round 1 / ?</span>
    <span class="round-points" id="round-points">0 pts on board</span>
  </div>
  <div class="team" id="team-2">
    <span class="team-name">Team 2</span>
    <span class="team-score" id="score-2">0</span>
  </div>
</div>

<script src="questions.js"></script>
<script>
  /* ---- State ---- */
  let currentQuestion = 0;
  let revealed = [false, false, false, false, false, false];
  let strikes = 0;
  let activeTeam = 1;
  let scores = [0, 0];

  /* ---- DOM refs ---- */
  const boardEl = document.getElementById("board");
  const questionEl = document.getElementById("question-text");
  const roundLabel = document.getElementById("round-label");
  const roundPoints = document.getElementById("round-points");
  const strikesEl = document.getElementById("strikes");
  const threeStrikesMsg = document.getElementById("three-strikes-msg");

  /* ---- Audio helpers (Web Audio API — short blips, no files needed) ---- */
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playDing() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  }

  function playBuzz() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sawtooth";
    osc.frequency.value = 120;
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
  }

  /* ---- Build board rows ---- */
  function buildBoard() {
    boardEl.innerHTML = "";
    for (let i = 0; i < 6; i++) {
      const row = document.createElement("div");
      row.className = "answer-row";
      row.id = `row-${i}`;
      row.innerHTML = `
        <div class="answer-card">
          <div class="card-face card-front"><span class="rank">${i + 1}</span></div>
          <div class="card-face card-back">
            <span class="rank">${i + 1}</span>
            <span class="answer-text" id="ans-text-${i}"></span>
            <span class="answer-points" id="ans-pts-${i}"></span>
          </div>
        </div>`;
      boardEl.appendChild(row);
    }
  }

  /* ---- Render current question ---- */
  function renderQuestion() {
    const q = questions[currentQuestion];
    questionEl.textContent = q.question;
    roundLabel.textContent = `Round ${currentQuestion + 1} / ${questions.length}`;

    for (let i = 0; i < 6; i++) {
      const row = document.getElementById(`row-${i}`);
      const ans = q.answers[i];
      document.getElementById(`ans-text-${i}`).textContent = ans ? ans.text : "";
      document.getElementById(`ans-pts-${i}`).textContent = ans ? ans.points : "";
      row.classList.toggle("revealed", revealed[i]);
    }
    updateRoundPoints();
  }

  /* ---- Points on board ---- */
  function updateRoundPoints() {
    const q = questions[currentQuestion];
    let pts = 0;
    for (let i = 0; i < 6; i++) {
      if (revealed[i] && q.answers[i]) pts += q.answers[i].points;
    }
    roundPoints.textContent = `${pts} pts on board`;
  }

  /* ---- Reveal answer ---- */
  function revealAnswer(idx) {
    if (idx < 0 || idx >= 6) return;
    const q = questions[currentQuestion];
    if (!q.answers[idx] || revealed[idx]) return;
    revealed[idx] = true;
    document.getElementById(`row-${idx}`).classList.add("revealed");
    updateRoundPoints();
    playDing();
  }

  /* ---- Strikes ---- */
  function addStrike() {
    if (strikes >= 3) return;
    strikes++;
    const el = document.getElementById(`strike-${strikes}`);
    el.classList.add("visible");
    playBuzz();

    if (strikes === 3) {
      threeStrikesMsg.classList.add("visible");
      setTimeout(() => threeStrikesMsg.classList.remove("visible"), 1500);
    }
  }

  function clearStrikes() {
    strikes = 0;
    for (let i = 1; i <= 3; i++) {
      const el = document.getElementById(`strike-${i}`);
      el.classList.remove("visible");
      /* Reset animation by forcing reflow */
      void el.offsetWidth;
    }
  }

  /* ---- Navigate questions ---- */
  function goToQuestion(idx) {
    if (idx < 0 || idx >= questions.length) return;
    currentQuestion = idx;
    revealed = [false, false, false, false, false, false];
    clearStrikes();
    renderQuestion();
  }

  /* ---- Toggle active team ---- */
  function toggleTeam() {
    activeTeam = activeTeam === 1 ? 2 : 1;
    document.getElementById("team-1").classList.toggle("active", activeTeam === 1);
    document.getElementById("team-2").classList.toggle("active", activeTeam === 2);
  }

  /* ---- Award points ---- */
  function awardPoints() {
    const q = questions[currentQuestion];
    let pts = 0;
    for (let i = 0; i < 6; i++) {
      if (revealed[i] && q.answers[i]) pts += q.answers[i].points;
    }
    if (pts === 0) return;

    scores[activeTeam - 1] += pts;
    const scoreEl = document.getElementById(`score-${activeTeam}`);
    scoreEl.textContent = scores[activeTeam - 1];
    scoreEl.classList.remove("pulse");
    void scoreEl.offsetWidth;
    scoreEl.classList.add("pulse");

    /* Advance to next question */
    if (currentQuestion < questions.length - 1) {
      goToQuestion(currentQuestion + 1);
    }
  }

  /* ---- Keyboard handler ---- */
  document.addEventListener("keydown", (e) => {
    /* Resume audio context on first interaction (browser autoplay policy) */
    if (audioCtx.state === "suspended") audioCtx.resume();

    const key = e.key;

    if (key >= "1" && key <= "6") {
      revealAnswer(parseInt(key, 10) - 1);
    } else if (key === "x" || key === "X") {
      addStrike();
    } else if (key === "ArrowLeft") {
      goToQuestion(currentQuestion - 1);
    } else if (key === "ArrowRight") {
      goToQuestion(currentQuestion + 1);
    } else if (key === "t" || key === "T") {
      toggleTeam();
    } else if (key === " ") {
      e.preventDefault();
      awardPoints();
    }
  });

  /* ---- Init ---- */
  buildBoard();
  renderQuestion();
</script>
</body>
</html>
